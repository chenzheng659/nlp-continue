<!-- src/drone_visualizer/templates/visualizer.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>无人机路径3D可视化 - {{ data.mission_name }}</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="/static/main.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e6e6e6; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 320px; background: #16213e; padding: 20px; overflow-y: auto; }
        .visualization { flex: 1; position: relative; }
        #scene-container { width: 100%; height: 100%; }
        h1 { color: #4cc9f0; margin-bottom: 20px; font-size: 1.5em; }
        h2 { color: #4361ee; margin: 20px 0 10px; font-size: 1.2em; }
        .info-section { background: #0f3460; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; }
        button { padding: 10px 20px; background: #4361ee; color: white; border: none; border-radius: 5px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #3a56d4; }
        button:disabled { background: #555; cursor: not-allowed; }
        .path-points { max-height: 200px; overflow-y: auto; margin-top: 10px; }
        .path-point { padding: 8px; margin: 5px 0; background: rgba(67, 97, 238, 0.2); border-radius: 4px; font-size: 0.9em; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .stat-item { background: rgba(76, 201, 240, 0.1); padding: 10px; border-radius: 5px; text-align: center; }
        .stat-value { font-size: 1.5em; font-weight: bold; color: #4cc9f0; }
        .stat-label { font-size: 0.8em; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧控制面板 -->
        <div class="sidebar">
            <h1>🚁 无人机路径3D可视化</h1>
            
            <div class="info-section">
                <h2>任务信息</h2>
                <p id="mission-name">任务: {{ data.mission_name }}</p>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="total-distance">{{ "%.1f"|format(data.path_data.total_distance|default(0)) }}</div>
                        <div class="stat-label">总距离(m)</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="waypoint-count">{{ data.path_data.path|length }}</div>
                        <div class="stat-label">路径点</div>
                    </div>
                </div>
            </div>

            <div class="info-section">
                <h2>飞行控制</h2>
                <div class="controls">
                    <button id="play-btn" onclick="playAnimation()">▶️ 播放</button>
                    <button id="pause-btn" onclick="pauseAnimation()">⏸️ 暂停</button>
                    <button id="reset-btn" onclick="resetAnimation()">↺ 重置</button>
                    <input type="range" id="speed-control" min="0.1" max="3" step="0.1" value="{{ data.animation_speed }}" onchange="changeSpeed(this.value)">
                </div>
                <div>
                    <label>速度: <span id="speed-value">{{ data.animation_speed }}x</span></label>
                </div>
            </div>

            <div class="info-section">
                <h2>路径点详情</h2>
                <div class="path-points" id="path-points-list">
                    <!-- 路径点会通过JS动态填充 -->
                </div>
            </div>

            <div class="info-section">
                <h2>相机控制</h2>
                <div style="color: #aaa; font-size: 0.9em;">
                    <p>• 左键拖动: 旋转视角</p>
                    <p>• 右键拖动: 平移视角</p>
                    <p>• 滚轮: 缩放</p>
                    <button onclick="resetCamera()" style="margin-top: 10px;">重置相机视角</button>
                </div>
            </div>
        </div>

        <!-- 右侧3D场景 -->
        <div class="visualization">
            <div id="scene-container"></div>
            <div id="hud" style="position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px;">
                <div>位置: <span id="drone-pos">(0, 0, 0)</span></div>
                <div>速度: <span id="drone-speed">0.0 m/s</span></div>
                <div>状态: <span id="drone-status">就绪</span></div>
            </div>
        </div>
    </div>

    <script>
        // 从模板传递的数据
        const PATH_DATA = {{ data.path_data|tojson }};
        const CONFIG = {
            pathColor: {{ data.path_color }},
            gridSize: {{ data.grid_size }},
            cameraPosition: {{ data.camera_position|tojson }}
        };

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            initVisualization();
        });
    </script>
</body>
</html>
